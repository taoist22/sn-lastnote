name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.1.1. Leave blank to bump patch from the latest v* tag.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:coverage
      - name: Determine release version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${INPUT_VERSION//[[:space:]]/}"
          VERSION="${VERSION#v}"
          PREV_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
          if [ -z "$VERSION" ]; then
            if [ -z "$PREV_TAG" ]; then
              VERSION="0.1.0"
            else
              BASE="${PREV_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
              VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version '$VERSION'. Expected MAJOR.MINOR.PATCH."
            exit 1
          fi
          TAG="v$VERSION"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag $TAG already exists."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Bump version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version
          npm run sync:version
      - run: npm run build
      - run: npm run validate:package
      - name: Commit and tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json PluginConfig.json
          git commit -m "chore(release): $TAG"
          git tag -a "$TAG" -m "$TAG"
          git push origin HEAD
          git push origin "$TAG"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: build/outputs/*.snplg
